# .woodpecker/mirror-sync.yml
when:
  - event: [push, manual]
    branch: main

steps:
  - name: github-sync
    image: alpine/git
    failure: ignore
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - |
        set -e
        echo "Repo: $CI_REPO_NAME  Token: $([ -n "$GITHUB_TOKEN" ] && echo present || echo MISSING)"
        git remote add github "https://x-access-token:$GITHUB_TOKEN@github.com/alpha-delta-network/$CI_REPO_NAME.git" 2>/dev/null || git remote set-url github "https://x-access-token:$GITHUB_TOKEN@github.com/alpha-delta-network/$CI_REPO_NAME.git"
        for attempt in 1 2 3 4 5; do
          git push github HEAD:refs/heads/main --force --no-thin && echo "GitHub synced $CI_REPO_NAME" && exit 0
          echo "Attempt $attempt/5 failed, retrying in 30s..."
          sleep 30
        done
        echo "GitHub sync failed after 5 attempts"
        exit 1

  - name: radicle-sync
    image: curlimages/curl:latest
    when:
      - event: push
        branch: main
    commands:
      - echo "radicle sync now per-merge server-side via Forgejo post-receive hook (daemon /push); cross-host CI curl -H "Authorization: token $FORGEJO_TOKEN" retired"
