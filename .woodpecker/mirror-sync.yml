# .woodpecker/mirror-sync.yml
when:
  - event: [push, manual]
    branch: main

steps:
  - name: github-sync
    image: curlimages/curl:latest
    commands:
      - echo "github mirror runs per-merge server-side via Forgejo post-receive hook -> daemon /github-sync; in-CI step retired (was failure:ignore on a stale secret)"
  - name: radicle-sync
    image: curlimages/curl:latest
    when:
      - event: push
        branch: main
    commands:
      - echo "radicle sync now runs per-merge server-side via Forgejo post-receive hook -> daemon /push; cross-host CI HTTP trigger retired"
