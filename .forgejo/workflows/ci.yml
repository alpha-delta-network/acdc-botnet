name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-check:
    name: Format Check
    runs-on: native
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        run: |
          docker run --rm             -v /var/cache/cargo:/cargo_cache             -v $GITHUB_WORKSPACE:/workspace             -w /workspace             -e CARGO_HOME=/cargo_cache             -e CARGO_INCREMENTAL=0             165.227.224.22:5000/rust-builder:1.92.0-ci             bash -c 'rustup component add --toolchain nightly rustfmt && cargo +nightly fmt --all -- --check'

  clippy:
    name: Clippy
    runs-on: native
    steps:
      - uses: actions/checkout@v4
      - name: Clippy lint
        run: |
          docker run --rm             -v /var/cache/cargo:/cargo_cache             -v $GITHUB_WORKSPACE:/workspace             -w /workspace             -e CARGO_HOME=/cargo_cache             -e CARGO_INCREMENTAL=0             165.227.224.22:5000/rust-builder:1.92.0-ci             bash -c 'apt-get update -qq && apt-get install -y -qq protobuf-compiler && rustup component add clippy && cargo clippy --all-targets --all-features -- -W clippy::all'

  test:
    name: Test
    runs-on: native
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          docker run --rm             -v /var/cache/cargo:/cargo_cache             -v $GITHUB_WORKSPACE:/workspace             -w /workspace             -e CARGO_HOME=/cargo_cache             -e CARGO_INCREMENTAL=0             165.227.224.22:5000/rust-builder:1.92.0-ci             bash -c 'apt-get update -qq && apt-get install -y -qq protobuf-compiler && cargo test --release --all-features'

  build:
    name: Build
    runs-on: native
    steps:
      - uses: actions/checkout@v4
      - name: Build release
        run: |
          docker run --rm             -v /var/cache/cargo:/cargo_cache             -v $GITHUB_WORKSPACE:/workspace             -w /workspace             -e CARGO_HOME=/cargo_cache             -e CARGO_INCREMENTAL=0             165.227.224.22:5000/rust-builder:1.92.0-ci             bash -c 'apt-get update -qq && apt-get install -y -qq protobuf-compiler && cargo build --release --all-features'

  doc-check:
    name: Doc Check
    runs-on: native
    steps:
      - uses: actions/checkout@v4
      - name: Check docs
        run: |
          docker run --rm             -v /var/cache/cargo:/cargo_cache             -v $GITHUB_WORKSPACE:/workspace             -w /workspace             -e CARGO_HOME=/cargo_cache             -e CARGO_INCREMENTAL=0             165.227.224.22:5000/rust-builder:1.92.0-ci             bash -c 'apt-get update -qq && apt-get install -y -qq protobuf-compiler && cargo doc --no-deps --all-features'

  mirror-sync:
    name: Mirror Sync
    needs: [format-check, clippy, test, build, doc-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: alpha-delta-network/alpha-delta-context/.forgejo/workflows/mirror-sync.yml@main
