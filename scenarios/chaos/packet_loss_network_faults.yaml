scenario:
  metadata:
    id: "CHAOS-006"
    name: "Packet Loss & Network Faults"
    type: chaos
    duration: "1.5 hours"

  description: "Test network resilience under various packet loss scenarios: random drops, burst loss, asymmetric patterns. Verify consensus, finality, and cross-chain operations remain functional."

  setup:
    network:
      alpha_rest: "http://localhost:3030"
      delta_rest: "http://localhost:3031"
      network_control: true  # Requires tc (traffic control) or similar

    bots:
      - id: "validator-{1-21}"
        role: "validator"
        variant: "honest"
        count: 21

      - id: "user-{1-100}"
        role: "general_user"
        variant: "power"
        count: 100
        wallet_ax: 50000000
        wallet_dx: 50000000

      - id: "cross-chain-user-{1-50}"
        role: "general_user"
        variant: "power"
        count: 50
        wallet_ax: 100000000

  phases:
    - name: "Baseline - no packet loss"
      duration: "10 min"
      network_conditions:
        packet_loss: 0%
        latency: 0ms
        jitter: 0ms

      bots: "validator-*"
      behavior: "validator.produce_blocks"
      params:
        block_production_rate: "normal"

      concurrent:
        - bots: "user-{1-50}"
          behavior: "transfer.simple"
          params:
            transactions_per_min: 100

        - bots: "cross-chain-user-{1-20}"
          behavior: "cross_chain.lock_mint"
          params:
            amount: 10000000
            lock_frequency: "1 per 30s"

      metrics:
        - baseline_tps: "transactions/sec"
        - baseline_block_time: "seconds"
        - baseline_finality_time: "seconds"
        - baseline_cross_chain_latency: "seconds"
        - baseline_consensus_rounds: "count"

      assertions:
        - network_healthy: true
        - finality_consistent: true
        - cross_chain_success_rate: ">99%"

    - name: "5% random packet loss"
      duration: "15 min"
      network_conditions:
        packet_loss: 5%
        loss_model: "random"
        apply_to: "all_nodes"

      bots: "validator-*"
      behavior: "validator.produce_blocks"

      concurrent:
        - bots: "user-{1-50}"
          behavior: "transfer.simple"
          params:
            transactions_per_min: 100
            track_failures: true

        - bots: "cross-chain-user-{1-20}"
          behavior: "cross_chain.lock_mint"
          params:
            amount: 10000000
            lock_frequency: "1 per 30s"
            enable_retries: true

      metrics:
        - tps_with_5pct_loss: "transactions/sec"
        - block_time_increase: "%"
        - finality_time_increase: "%"
        - cross_chain_latency_increase: "%"
        - consensus_round_increase: "%"
        - transaction_retry_rate: "%"

      assertions:
        - tps_degradation: "<15%"
        - finality_maintained: true
        - cross_chain_success_rate: ">95%"
        - no_consensus_stalls: true

    - name: "10% random packet loss"
      duration: "15 min"
      network_conditions:
        packet_loss: 10%
        loss_model: "random"
        apply_to: "all_nodes"

      bots: "validator-*"
      behavior: "validator.produce_blocks"

      concurrent:
        - bots: "user-{1-50}"
          behavior: "transfer.simple"
          params:
            transactions_per_min: 100
            track_failures: true

        - bots: "cross-chain-user-{1-20}"
          behavior: "cross_chain.lock_mint"
          params:
            amount: 10000000
            lock_frequency: "1 per 30s"
            enable_retries: true

      metrics:
        - tps_with_10pct_loss: "transactions/sec"
        - block_time_increase: "%"
        - finality_time_increase: "%"
        - cross_chain_latency_increase: "%"
        - consensus_timeout_events: "count"
        - view_changes: "count"

      assertions:
        - tps_degradation: "<30%"
        - finality_maintained: true
        - cross_chain_success_rate: ">90%"
        - consensus_progressing: true

    - name: "25% random packet loss (extreme)"
      duration: "15 min"
      network_conditions:
        packet_loss: 25%
        loss_model: "random"
        apply_to: "all_nodes"

      bots: "validator-*"
      behavior: "validator.produce_blocks"
      params:
        expect_degradation: true

      concurrent:
        - bots: "user-{1-30}"
          behavior: "transfer.simple"
          params:
            transactions_per_min: 50
            track_failures: true

      metrics:
        - tps_with_25pct_loss: "transactions/sec"
        - block_time_increase: "%"
        - finality_time_increase: "%"
        - consensus_timeout_events: "count"
        - view_changes: "count"
        - liveness_maintained: "boolean"

      assertions:
        - liveness_maintained: true  # Should still make progress
        - finality_eventually_achieved: true
        - tps_degradation: "<60%"

    - name: "Burst packet loss"
      duration: "15 min"
      network_conditions:
        packet_loss: 50%
        loss_model: "burst"
        burst_duration: "5s"
        burst_interval: "30s"
        apply_to: "all_nodes"

      bots: "validator-*"
      behavior: "validator.produce_blocks"

      concurrent:
        - bots: "user-{1-50}"
          behavior: "transfer.simple"
          params:
            transactions_per_min: 100
            track_failures: true

      metrics:
        - burst_events: "count"
        - consensus_timeouts_during_burst: "count"
        - view_changes_during_burst: "count"
        - recovery_time_after_burst: "seconds"
        - transactions_lost_during_burst: "count"

      assertions:
        - consensus_recovers_after_burst: true
        - recovery_time: "<30s"
        - no_permanent_stalls: true

    - name: "Asymmetric packet loss"
      duration: "15 min"
      network_conditions:
        - direction: "validator-{1-10} → validator-{11-21}"
          packet_loss: 20%
        - direction: "validator-{11-21} → validator-{1-10}"
          packet_loss: 5%

      bots: "validator-*"
      behavior: "validator.produce_blocks"

      concurrent:
        - bots: "user-{1-50}"
          behavior: "transfer.simple"
          params:
            transactions_per_min: 100

      metrics:
        - asymmetric_consensus_rounds: "count"
        - asymmetric_view_changes: "count"
        - leader_election_skew: "% towards low-loss partition"
        - finality_time_variance: "seconds"

      assertions:
        - consensus_maintained: true
        - no_partition_formed: true
        - both_groups_participating: true

    - name: "Packet loss on validators only"
      duration: "10 min"
      network_conditions:
        packet_loss: 15%
        loss_model: "random"
        apply_to: "validators_only"

      bots: "validator-*"
      behavior: "validator.produce_blocks"

      concurrent:
        - bots: "user-*"
          behavior: "transfer.simple"
          params:
            transactions_per_min: 100

      metrics:
        - validator_consensus_impact: "%"
        - user_transaction_success_rate: "%"
        - consensus_latency_increase: "%"

      assertions:
        - user_transactions_mostly_unaffected: true
        - consensus_degradation_localized: true

    - name: "Packet loss during cross-chain operations"
      duration: "20 min"
      network_conditions:
        packet_loss: 10%
        loss_model: "random"
        apply_to: "all_nodes"

      phases:
        - name: "Initiate locks during packet loss"
          bots: "cross-chain-user-*"
          behavior: "cross_chain.lock_mint"
          params:
            amount: 10000000
            lock_frequency: "1 per 20s"
            enable_retries: true
            max_retries: 5

        - name: "Monitor IPC message delivery"
          behavior: "monitor.ipc_messages"
          params:
            track_delivery_attempts: true
            track_delivery_latency: true

        - name: "Verify atomicity"
          bots: "cross-chain-user-*"
          behavior: "verify.cross_chain_state"
          params:
            verify_atomicity: true
            check_stuck_operations: true

      metrics:
        - ipc_message_retry_rate: "%"
        - ipc_message_delivery_latency: "seconds"
        - cross_chain_operation_success_rate: "%"
        - stuck_cross_chain_operations: "count (should be 0)"
        - atomicity_violations: "count (should be 0)"

      assertions:
        - cross_chain_success_rate: ">90%"
        - no_atomicity_violations: true
        - no_permanently_stuck_operations: true
        - ipc_retries_working: true

    - name: "Combined network faults"
      duration: "15 min"
      network_conditions:
        packet_loss: 10%
        latency: 200ms
        jitter: 50ms
        bandwidth_limit: "10Mbps"
        apply_to: "all_nodes"

      bots: "validator-*"
      behavior: "validator.produce_blocks"

      concurrent:
        - bots: "user-{1-50}"
          behavior: "transfer.simple"
          params:
            transactions_per_min: 100

        - bots: "cross-chain-user-{1-20}"
          behavior: "cross_chain.lock_mint"
          params:
            amount: 10000000
            lock_frequency: "1 per 30s"

      metrics:
        - combined_tps: "transactions/sec"
        - combined_block_time: "seconds"
        - combined_finality_time: "seconds"
        - combined_consensus_rounds: "count"
        - combined_cross_chain_latency: "seconds"

      assertions:
        - network_functional_under_combined_stress: true
        - tps_degradation: "<50%"
        - finality_maintained: true
        - cross_chain_success_rate: ">85%"

    - name: "Recovery to baseline"
      duration: "10 min"
      network_conditions:
        packet_loss: 0%
        latency: 0ms
        jitter: 0ms

      bots: "validator-*"
      behavior: "validator.produce_blocks"

      concurrent:
        - bots: "user-*"
          behavior: "transfer.simple"
          params:
            transactions_per_min: 100

      metrics:
        - recovery_tps: "transactions/sec"
        - recovery_block_time: "seconds"
        - recovery_finality_time: "seconds"
        - time_to_baseline_performance: "seconds"

      assertions:
        - performance_restored: true
        - tps_within_5pct_of_baseline: true
        - finality_time_normalized: true

  success_criteria:
    - liveness_under_5pct_loss: true
    - liveness_under_10pct_loss: true
    - liveness_under_25pct_loss: true
    - burst_recovery: "<30s"
    - asymmetric_consensus_maintained: true
    - cross_chain_resilient_to_loss: true
    - no_atomicity_violations: true
    - full_recovery_achieved: true

  notes:
    - "Requires Linux tc (traffic control) or equivalent for packet loss simulation"
    - "Real-world packet loss typically <1%, but testing higher levels ensures robustness"
    - "Burst loss simulates congestion or brief outages"
    - "Asymmetric loss common in real networks (upload/download imbalance)"
    - "Cross-chain operations especially sensitive to packet loss (multi-hop communication)"
    - "Consensus should remain live even under extreme loss (25%+)"
    - "Timeout and retry mechanisms critical for resilience"
