# gid_multisig_ops.yaml
# Ongoing GID multisig mint operations — all 5 GIDs, all 30 bots.
#
# Each GID's 6 bots (1 initiator + 5 followers) collaborate on a 5/6 mint:
#   1. Initiator proposes a mint
#   2. 4 followers approve (threshold is 5 including initiator auto-approval)
#   3. Initiator executes
#   4. Verify recipient received credits.record
#
# The initiator's vote counts as approval-1, so only 4 additional approvals needed.
# The 5th follower is available as a fallback (e.g. if one approval tx fails).
#
# Run after gid_genesis_register.yaml has completed.
#
# Usage:
#   python3 tools/run-suite.py \
#     --scenario scenarios/ops/gid_multisig_ops.yaml \
#     --gid-keys /tmp/gid-keys.yaml \
#     --keys /tmp/testnet-keys.yaml \
#     --nodes testnet001.ac-dc.network

scenario:
  metadata:
    id: "GID-OPS-001"
    name: "GID All-5 Multisig Mint Operations"
    type: ops
    category: gid_multisig
    duration: "20 min"
    description: >
      Exercise all 5 GIDs through a full propose→approve(×4)→execute cycle.
      30 bots (6 per GID) participate. Runs all 5 GIDs in parallel.
      Each GID mints to a funded_wallet recipient for balance verification.

  key_source: gid_keys   # gid-keys.yaml for GID owner keys
  key_source_2: testnet  # testnet-keys.yaml for recipient funded_wallets

  setup:
    network:
      alpha_rest: "http://{node}:3030"

    bots:
      # ── GID-1 Economic Council Alpha ──────────────────────────────────────
      - id: "gid1_init"
        role: "gid_initiator"
        gid_id: "GID-1"
        gid_field: "1field"
        key_ref: "gid_keys.gids[0].initiator"

      - id: "gid1_f1"
        role: "gid_follower"
        gid_id: "GID-1"
        key_ref: "gid_keys.gids[0].followers[0]"

      - id: "gid1_f2"
        role: "gid_follower"
        gid_id: "GID-1"
        key_ref: "gid_keys.gids[0].followers[1]"

      - id: "gid1_f3"
        role: "gid_follower"
        gid_id: "GID-1"
        key_ref: "gid_keys.gids[0].followers[2]"

      - id: "gid1_f4"
        role: "gid_follower"
        gid_id: "GID-1"
        key_ref: "gid_keys.gids[0].followers[3]"

      - id: "gid1_f5"
        role: "gid_follower_standby"
        gid_id: "GID-1"
        key_ref: "gid_keys.gids[0].followers[4]"

      # ── GID-2 Technical Standards Alpha ──────────────────────────────────
      - id: "gid2_init"
        role: "gid_initiator"
        gid_id: "GID-2"
        gid_field: "2field"
        key_ref: "gid_keys.gids[1].initiator"

      - id: "gid2_f1"
        role: "gid_follower"
        gid_id: "GID-2"
        key_ref: "gid_keys.gids[1].followers[0]"

      - id: "gid2_f2"
        role: "gid_follower"
        gid_id: "GID-2"
        key_ref: "gid_keys.gids[1].followers[1]"

      - id: "gid2_f3"
        role: "gid_follower"
        gid_id: "GID-2"
        key_ref: "gid_keys.gids[1].followers[2]"

      - id: "gid2_f4"
        role: "gid_follower"
        gid_id: "GID-2"
        key_ref: "gid_keys.gids[1].followers[3]"

      - id: "gid2_f5"
        role: "gid_follower_standby"
        gid_id: "GID-2"
        key_ref: "gid_keys.gids[1].followers[4]"

      # ── GID-3 Security Council Alpha ──────────────────────────────────────
      - id: "gid3_init"
        role: "gid_initiator"
        gid_id: "GID-3"
        gid_field: "3field"
        key_ref: "gid_keys.gids[2].initiator"

      - id: "gid3_f1"
        role: "gid_follower"
        gid_id: "GID-3"
        key_ref: "gid_keys.gids[2].followers[0]"

      - id: "gid3_f2"
        role: "gid_follower"
        gid_id: "GID-3"
        key_ref: "gid_keys.gids[2].followers[1]"

      - id: "gid3_f3"
        role: "gid_follower"
        gid_id: "GID-3"
        key_ref: "gid_keys.gids[2].followers[2]"

      - id: "gid3_f4"
        role: "gid_follower"
        gid_id: "GID-3"
        key_ref: "gid_keys.gids[2].followers[3]"

      - id: "gid3_f5"
        role: "gid_follower_standby"
        gid_id: "GID-3"
        key_ref: "gid_keys.gids[2].followers[4]"

      # ── GID-4 Treasury Alpha ───────────────────────────────────────────────
      - id: "gid4_init"
        role: "gid_initiator"
        gid_id: "GID-4"
        gid_field: "4field"
        key_ref: "gid_keys.gids[3].initiator"

      - id: "gid4_f1"
        role: "gid_follower"
        gid_id: "GID-4"
        key_ref: "gid_keys.gids[3].followers[0]"

      - id: "gid4_f2"
        role: "gid_follower"
        gid_id: "GID-4"
        key_ref: "gid_keys.gids[3].followers[1]"

      - id: "gid4_f3"
        role: "gid_follower"
        gid_id: "GID-4"
        key_ref: "gid_keys.gids[3].followers[2]"

      - id: "gid4_f4"
        role: "gid_follower"
        gid_id: "GID-4"
        key_ref: "gid_keys.gids[3].followers[3]"

      - id: "gid4_f5"
        role: "gid_follower_standby"
        gid_id: "GID-4"
        key_ref: "gid_keys.gids[3].followers[4]"

      # ── GID-5 Protocol Governance Alpha ────────────────────────────────────
      - id: "gid5_init"
        role: "gid_initiator"
        gid_id: "GID-5"
        gid_field: "5field"
        key_ref: "gid_keys.gids[4].initiator"

      - id: "gid5_f1"
        role: "gid_follower"
        gid_id: "GID-5"
        key_ref: "gid_keys.gids[4].followers[0]"

      - id: "gid5_f2"
        role: "gid_follower"
        gid_id: "GID-5"
        key_ref: "gid_keys.gids[4].followers[1]"

      - id: "gid5_f3"
        role: "gid_follower"
        gid_id: "GID-5"
        key_ref: "gid_keys.gids[4].followers[2]"

      - id: "gid5_f4"
        role: "gid_follower"
        gid_id: "GID-5"
        key_ref: "gid_keys.gids[4].followers[3]"

      - id: "gid5_f5"
        role: "gid_follower_standby"
        gid_id: "GID-5"
        key_ref: "gid_keys.gids[4].followers[4]"

      # ── Recipients (one funded_wallet per GID mint) ────────────────────────
      - id: "recipient_gid1"
        role: "recipient"
        key_ref: "keys.funded_wallets[0]"

      - id: "recipient_gid2"
        role: "recipient"
        key_ref: "keys.funded_wallets[1]"

      - id: "recipient_gid3"
        role: "recipient"
        key_ref: "keys.funded_wallets[2]"

      - id: "recipient_gid4"
        role: "recipient"
        key_ref: "keys.funded_wallets[3]"

      - id: "recipient_gid5"
        role: "recipient"
        key_ref: "keys.funded_wallets[4]"

  # ── Phase 1: All 5 GIDs propose in parallel ─────────────────────────────────
  phases:
    - id: "p1_propose_all"
      name: "All 5 GIDs propose mint simultaneously"
      parallel: true
      actions:
        - bot: "gid1_init"
          behavior: "gid.propose_mint"
          params:
            gid_field: "1field"
            recipient: "key_ref:keys.funded_wallets[0].alpha_addr"
            amount: 5000000000
          capture: { action_id: "gid1_action_id" }

        - bot: "gid2_init"
          behavior: "gid.propose_mint"
          params:
            gid_field: "2field"
            recipient: "key_ref:keys.funded_wallets[1].alpha_addr"
            amount: 5000000000
          capture: { action_id: "gid2_action_id" }

        - bot: "gid3_init"
          behavior: "gid.propose_mint"
          params:
            gid_field: "3field"
            recipient: "key_ref:keys.funded_wallets[2].alpha_addr"
            amount: 5000000000
          capture: { action_id: "gid3_action_id" }

        - bot: "gid4_init"
          behavior: "gid.propose_mint"
          params:
            gid_field: "4field"
            recipient: "key_ref:keys.funded_wallets[3].alpha_addr"
            amount: 5000000000
          capture: { action_id: "gid4_action_id" }

        - bot: "gid5_init"
          behavior: "gid.propose_mint"
          params:
            gid_field: "5field"
            recipient: "key_ref:keys.funded_wallets[4].alpha_addr"
            amount: 5000000000
          capture: { action_id: "gid5_action_id" }

  # ── Phase 2: All 20 follower approvals in parallel ───────────────────────────
    - id: "p2_approve_all"
      name: "All 20 followers approve (4 per GID) in parallel"
      parallel: true
      actions:
        # GID-1 approvals
        - { bot: "gid1_f1", behavior: "gid.approve_mint", params: { action_id: "$captured.gid1_action_id" } }
        - { bot: "gid1_f2", behavior: "gid.approve_mint", params: { action_id: "$captured.gid1_action_id" } }
        - { bot: "gid1_f3", behavior: "gid.approve_mint", params: { action_id: "$captured.gid1_action_id" } }
        - { bot: "gid1_f4", behavior: "gid.approve_mint", params: { action_id: "$captured.gid1_action_id" } }
        # GID-2 approvals
        - { bot: "gid2_f1", behavior: "gid.approve_mint", params: { action_id: "$captured.gid2_action_id" } }
        - { bot: "gid2_f2", behavior: "gid.approve_mint", params: { action_id: "$captured.gid2_action_id" } }
        - { bot: "gid2_f3", behavior: "gid.approve_mint", params: { action_id: "$captured.gid2_action_id" } }
        - { bot: "gid2_f4", behavior: "gid.approve_mint", params: { action_id: "$captured.gid2_action_id" } }
        # GID-3 approvals
        - { bot: "gid3_f1", behavior: "gid.approve_mint", params: { action_id: "$captured.gid3_action_id" } }
        - { bot: "gid3_f2", behavior: "gid.approve_mint", params: { action_id: "$captured.gid3_action_id" } }
        - { bot: "gid3_f3", behavior: "gid.approve_mint", params: { action_id: "$captured.gid3_action_id" } }
        - { bot: "gid3_f4", behavior: "gid.approve_mint", params: { action_id: "$captured.gid3_action_id" } }
        # GID-4 approvals
        - { bot: "gid4_f1", behavior: "gid.approve_mint", params: { action_id: "$captured.gid4_action_id" } }
        - { bot: "gid4_f2", behavior: "gid.approve_mint", params: { action_id: "$captured.gid4_action_id" } }
        - { bot: "gid4_f3", behavior: "gid.approve_mint", params: { action_id: "$captured.gid4_action_id" } }
        - { bot: "gid4_f4", behavior: "gid.approve_mint", params: { action_id: "$captured.gid4_action_id" } }
        # GID-5 approvals
        - { bot: "gid5_f1", behavior: "gid.approve_mint", params: { action_id: "$captured.gid5_action_id" } }
        - { bot: "gid5_f2", behavior: "gid.approve_mint", params: { action_id: "$captured.gid5_action_id" } }
        - { bot: "gid5_f3", behavior: "gid.approve_mint", params: { action_id: "$captured.gid5_action_id" } }
        - { bot: "gid5_f4", behavior: "gid.approve_mint", params: { action_id: "$captured.gid5_action_id" } }

  # ── Phase 3: All 5 GIDs execute in parallel ──────────────────────────────────
    - id: "p3_execute_all"
      name: "All 5 initiators execute mint in parallel"
      parallel: true
      actions:
        - { bot: "gid1_init", behavior: "gid.execute_mint", params: { action_id: "$captured.gid1_action_id" } }
        - { bot: "gid2_init", behavior: "gid.execute_mint", params: { action_id: "$captured.gid2_action_id" } }
        - { bot: "gid3_init", behavior: "gid.execute_mint", params: { action_id: "$captured.gid3_action_id" } }
        - { bot: "gid4_init", behavior: "gid.execute_mint", params: { action_id: "$captured.gid4_action_id" } }
        - { bot: "gid5_init", behavior: "gid.execute_mint", params: { action_id: "$captured.gid5_action_id" } }

  # ── Phase 4: Verify all recipients received credits.record ───────────────────
    - id: "p4_verify_all"
      name: "Verify all recipients received minted AX"
      parallel: true
      actions:
        - { bot: "recipient_gid1", behavior: "check_balance", params: { chain: "alpha", asset: "ax", expected_min: 5000000000 } }
        - { bot: "recipient_gid2", behavior: "check_balance", params: { chain: "alpha", asset: "ax", expected_min: 5000000000 } }
        - { bot: "recipient_gid3", behavior: "check_balance", params: { chain: "alpha", asset: "ax", expected_min: 5000000000 } }
        - { bot: "recipient_gid4", behavior: "check_balance", params: { chain: "alpha", asset: "ax", expected_min: 5000000000 } }
        - { bot: "recipient_gid5", behavior: "check_balance", params: { chain: "alpha", asset: "ax", expected_min: 5000000000 } }

  success_criteria:
    all_phases_pass: true
    all_mints_executed: true
    all_balances_verified: true

# ── Failure handling ─────────────────────────────────────────────────────────
  on_phase_failure:
    p2_approve_all:
      # If fewer than 4/5 approvals succeed per GID, retry with standby follower
      retry_with_standby: true
      standby_bots:
        GID-1: "gid1_f5"
        GID-2: "gid2_f5"
        GID-3: "gid3_f5"
        GID-4: "gid4_f5"
        GID-5: "gid5_f5"
      max_retries: 1
