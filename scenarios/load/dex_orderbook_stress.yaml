scenario:
  metadata:
    id: "LOAD-004"
    name: "DEX Orderbook Stress Test"
    type: load
    duration: "30 min"

  description: "10,000 active orders across 100 price levels, 500 orders/sec"

  setup:
    network:
      delta_rest: "http://localhost:3031"

    bots:
      - id: "trader-{1-800}"
        role: "trader"
        variant: "spot"
        count: 800
        wallet_ax: 1000000
        wallet_dx: 1000000

  phases:
    - name: "Initial orderbook population"
      duration: "5 min"
      bots: "trader-{1-400}"
      behavior: "dex.place_limit_orders"
      params:
        orders_per_bot: 10
        price_spread: "100 levels"
      assertions:
        - orderbook_populated: true
        - orders_in_book: 4000

    - name: "Continuous order flow"
      duration: "15 min"
      bots: "trader-*"
      behavior: "dex.trading_activity"
      params:
        place_rate: 0.8  # 80% place orders
        cancel_rate: 0.2  # 20% cancel
        orders_per_second: 0.625  # 800 * 0.625 = 500 ops/sec
      metrics:
        - orders_per_second: 500
        - active_orders: "count"
        - orderbook_depth: "levels"
        - match_rate: "fills/sec"

    - name: "Mass cancellation"
      duration: "5 min"
      bots: "trader-*"
      behavior: "dex.cancel_all_orders"
      assertions:
        - cancellations_processed: true
        - orderbook_cleared: true

    - name: "Recovery test"
      duration: "5 min"
      bots: "trader-{1-100}"
      behavior: "dex.place_limit_orders"
      params:
        orders_per_bot: 5
      assertions:
        - orderbook_functional: true

  success_criteria:
    - peak_active_orders_above: 10000
    - order_matching_stable: true
    - no_orderbook_corruption: true
    - cancel_operations_fast: true
