scenario:
  metadata:
    id: "GID-INT-001"
    name: "GID Insufficient Approvals Rejection Test"
    type: integration
    category: gid
    duration: "5 min"
    description: "Verify execute_mint fails with only 4/6 approvals"

  setup:
    network:
      alpha_rest: "http://localhost:3030"
      delta_rest: "http://localhost:3031"

    bots:
      - id: "gid2_initiator"
        role: "gid_initiator"
        gid_id: "GID-2"
        wallet_ax: 1000

      - id: "gid2_follower_1"
        role: "gid_follower"
        gid_id: "GID-2"
        follower_index: 1
        wallet_ax: 100

      - id: "gid2_follower_2"
        role: "gid_follower"
        gid_id: "GID-2"
        follower_index: 2
        wallet_ax: 100

      - id: "gid2_follower_3"
        role: "gid_follower"
        gid_id: "GID-2"
        follower_index: 3
        wallet_ax: 100

      - id: "wallet_5"
        role: "recipient"
        wallet_ax: 0

  phases:
    - id: "p1_propose"
      name: "Propose Mint"
      bots: "gid2_initiator"
      behavior: "gid.propose_mint"
      params:
        gid_id: "GID-2"
        recipient: "wallet_5"
        amount: 1000000000
      capture:
        - action_id

    - id: "p2_partial_approve"
      name: "Only 3 Followers Approve, total 4/6"
      bots:
        - gid2_follower_1
        - gid2_follower_2
        - gid2_follower_3
      parallel: true
      behavior: "gid.approve_mint"
      params:
        action_id: "$captured.action_id"

    - id: "p3_execute_fail"
      name: "Execute Mint Must Fail INSUFFICIENT_APPROVALS"
      bots: "gid2_initiator"
      behavior: "gid.execute_mint"
      params:
        action_id: "$captured.action_id"
        recipient: "wallet_5"
        amount: 1000000000
        expect_failure: true
        expected_error: "INSUFFICIENT_APPROVALS"

  success_criteria:
    all_phases_pass: true
    execute_correctly_rejected: true
