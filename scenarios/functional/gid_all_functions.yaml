scenario:
  metadata:
    id: "GID-FUNC-003"
    name: "GID All Functions Test across All 5 GIDs"
    type: functional
    category: gid_comprehensive
    duration: "20 min"
    description: "Tests all GID functions: registration, propose/approve/reject, mint limit enforcement"

  setup:
    network:
      alpha_rest: "http://localhost:3030"
      delta_rest: "http://localhost:3031"

    bots:
      - id: "gid1_initiator"
        role: "gid_initiator"
        gid_id: "GID-1"
        wallet_ax: 1000

      - id: "gid2_initiator"
        role: "gid_initiator"
        gid_id: "GID-2"
        wallet_ax: 1000

      - id: "gid3_initiator"
        role: "gid_initiator"
        gid_id: "GID-3"
        wallet_ax: 1000

      - id: "gid4_initiator"
        role: "gid_initiator"
        gid_id: "GID-4"
        wallet_ax: 1000

      - id: "gid5_initiator"
        role: "gid_initiator"
        gid_id: "GID-5"
        wallet_ax: 1000

      - id: "gid1_follower_1"
        role: "gid_follower"
        gid_id: "GID-1"
        follower_index: 1
        wallet_ax: 100

      - id: "gid1_follower_2"
        role: "gid_follower"
        gid_id: "GID-1"
        follower_index: 2
        wallet_ax: 100

      - id: "gid1_follower_3"
        role: "gid_follower"
        gid_id: "GID-1"
        follower_index: 3
        wallet_ax: 100

      - id: "gid1_follower_4"
        role: "gid_follower"
        gid_id: "GID-1"
        follower_index: 4
        wallet_ax: 100

      - id: "wallet_verify"
        role: "recipient"
        wallet_ax: 0

  phases:
    - id: "p1_verify_registration"
      name: "Verify All 5 GIDs Registered"
      bots:
        - gid1_initiator
        - gid2_initiator
        - gid3_initiator
        - gid4_initiator
        - gid5_initiator
      parallel: true
      behavior: "gid.verify_registered"
      params:
        check_deployment: true

    - id: "p2_propose_all"
      name: "All 5 GIDs Propose Independent Mints"
      bots:
        - gid1_initiator
        - gid2_initiator
        - gid3_initiator
        - gid4_initiator
        - gid5_initiator
      parallel: true
      behavior: "gid.propose_mint"
      params:
        recipient: "wallet_verify"
        amount: 1000000000
      capture:
        - action_ids

    - id: "p3_approve_gid1"
      name: "Approve GID-1 to 5/6 threshold"
      bots:
        - gid1_follower_1
        - gid1_follower_2
        - gid1_follower_3
        - gid1_follower_4
      parallel: true
      behavior: "gid.approve_mint"
      params:
        action_id: "$captured.action_ids[GID-1]"

    - id: "p4_reject_gid2"
      name: "Reject GID-2 Proposal"
      bots: "gid2_initiator"
      behavior: "gid.reject_mint"
      params:
        action_id: "$captured.action_ids[GID-2]"

    - id: "p5_execute_gid1"
      name: "Execute GID-1 Mint"
      bots: "gid1_initiator"
      behavior: "gid.execute_mint"
      params:
        action_id: "$captured.action_ids[GID-1]"
        recipient: "wallet_verify"
        amount: 1000000000

    - id: "p6_limit_enforce"
      name: "Over-Limit Mint Must Fail"
      bots: "gid3_initiator"
      behavior: "gid.propose_mint"
      params:
        gid_id: "GID-3"
        recipient: "wallet_verify"
        amount: 10000000001
        expect_failure: true
        expected_error: "LIMIT_EXCEEDED"

    - id: "p7_verify"
      name: "Verify Final Balances"
      bots: "wallet_verify"
      behavior: "check_balance"
      params:
        expected_min: 1000000000

  success_criteria:
    all_phases_pass: true
    gid1_mint_executed: true
    gid2_rejection_confirmed: true
    limit_enforced: true
    all_gids_independent: true
